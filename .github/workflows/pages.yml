name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          AF5325: ${{ secrets.AF5325 }}
          BE6B87: ${{ secrets.BE6B87 }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('AF5325', '')
          env_b = os.environ.get('BE6B87', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 8f626d3d3f577081a3199b1ce61fbcf91aaa76 -->', env_a)
          if env_b:
              result = result.replace('<!-- 2bf9200e14da1a769082abb8 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
